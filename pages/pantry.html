<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Pantry — Dispensa</title>
    <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
    <!-- Header con navigazione -->
    <header class="header">
        <h1>Smart Pantry</h1>
        <nav>
            <ul class="nav-links">
                <li><a href="pantry.html" class="active">Dispensa</a></li>
                <li><a href="recipes.html">Ricette</a></li>
                <li><a href="#" id="btn-logout">Esci</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <!-- Toolbar con filtro e azioni -->
        <div class="toolbar">
            <div class="filter-bar">
                <label for="filter-category">Categoria:</label>
                <select id="filter-category">
                    <option value="">Tutte</option>
                    <!-- Le categorie vengono caricate dinamicamente -->
                </select>
            </div>
            <div>
                <button class="btn btn-primary btn-small" id="btn-add-product">Aggiungi prodotto</button>
                <button class="btn btn-warning btn-small" id="btn-scan-barcode">Scansiona barcode</button>
            </div>
        </div>

        <!-- Lista prodotti -->
        <div id="product-list" class="product-list">
            <div class="loader">Caricamento prodotti...</div>
        </div>

        <!-- Stato vuoto -->
        <div id="empty-state" class="empty-state" style="display: none;">
            <p>La tua dispensa è vuota!</p>
            <button class="btn btn-primary" id="btn-add-first">Aggiungi il primo prodotto</button>
        </div>
    </div>

    <!-- Modale aggiunta/modifica prodotto -->
    <div class="modal-overlay" id="modal-product">
        <div class="modal">
            <h2 id="modal-title">Aggiungi prodotto</h2>
            <form id="form-product">
                <input type="hidden" id="product-id">
                <div class="form-group">
                    <label for="product-name">Nome *</label>
                    <input type="text" id="product-name" placeholder="Nome del prodotto" required>
                </div>
                <div class="form-group">
                    <label for="product-brand">Marca</label>
                    <input type="text" id="product-brand" placeholder="Marca (opzionale)">
                </div>
                <div class="form-group">
                    <label for="product-barcode">Barcode</label>
                    <input type="text" id="product-barcode" placeholder="Codice a barre (opzionale)">
                </div>
                <div class="form-group">
                    <label for="product-category">Categoria</label>
                    <select id="product-category">
                        <option value="">Seleziona categoria</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="product-quantity">Quantità</label>
                    <input type="number" id="product-quantity" value="1" min="0" step="0.1">
                </div>
                <div class="form-group">
                    <label for="product-unit">Unità</label>
                    <select id="product-unit">
                        <option value="pz">Pezzi</option>
                        <option value="kg">Kg</option>
                        <option value="g">Grammi</option>
                        <option value="l">Litri</option>
                        <option value="ml">Millilitri</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="product-expiry">Data di scadenza</label>
                    <input type="date" id="product-expiry">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-small" id="btn-cancel-modal">Annulla</button>
                    <button type="submit" class="btn btn-primary btn-small">Salva</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modale scanner barcode -->
    <div class="modal-overlay" id="modal-scanner">
        <div class="modal">
            <h2>Scansiona Barcode</h2>
            <div class="scanner-container">
                <video id="scanner-video" autoplay playsinline></video>
                <canvas id="scanner-canvas" style="display: none;"></canvas>
            </div>
            <p id="scanner-status" style="text-align: center; margin-top: 10px;">
                Inquadra il barcode con la fotocamera...
            </p>
            <div class="modal-actions">
                <button type="button" class="btn btn-small" id="btn-close-scanner">Chiudi</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="../assets/js/pantry.js"></script>
    <script src="../assets/js/barcode.js"></script>
</body>
</html>
